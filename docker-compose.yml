name: trabalho-final-ceara

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW__CORE__FERNET_KEY:-}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "30"
    PYTHONPATH: /opt/airflow
    SRC_PG_HOST: "${SRC_PG_HOST}"
    SRC_PG_PORT: "${SRC_PG_PORT}"
    SRC_PG_DB: "${SRC_PG_DB}"
    SRC_PG_USER: "${SRC_PG_USER}"
    SRC_PG_PASSWORD: "${SRC_PG_PASSWORD}"
    DW_PG_HOST: "${DW_PG_HOST:-postgres-dw}"
    DW_PG_PORT: "${DW_PG_PORT:-5432}"
    DW_PG_DB: "${DW_PG_DB:-dw_ceara}"
    DW_PG_USER: "${DW_PG_USER:-dw_user}"
    DW_PG_PASSWORD: "${DW_PG_PASSWORD:-dw_pass}"
    API_BASE_URL: "${API_BASE_URL:-https://api-dados-abertos.cearatransparente.ce.gov.br}"
    API_CONTRATOS_ENDPOINT: "${API_CONTRATOS_ENDPOINT:-/transparencia/contratos/contratos}"
    HDFS_WEBHDFS_URL: "${HDFS_WEBHDFS_URL:-http://namenode:9870}"
    HDFS_USER: "${HDFS_USER:-root}"
    HDFS_BRONZE_PATH: "${HDFS_BRONZE_PATH:-/data/bronze}"
    HDFS_SILVER_PATH: "${HDFS_SILVER_PATH:-/data/silver}"
    EXTRACT_START_DATE: "${EXTRACT_START_DATE:-2026-01-01}"
    EXTRACT_END_DATE: "${EXTRACT_END_DATE:-2026-06-30}"
    OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
    OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
  volumes:
    - .:/opt/airflow
  networks:
    - pipeline-net
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------- #
  # Data Warehouse (camada Gold)
  # ---------------------------------------------------------------------- #
  postgres-dw:
    image: postgres:15
    environment:
      POSTGRES_DB: ${DW_PG_DB:-dw_ceara}
      POSTGRES_USER: ${DW_PG_USER:-dw_user}
      POSTGRES_PASSWORD: ${DW_PG_PASSWORD:-dw_pass}
    ports:
      - "5434:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./sql/dw_schema.sql:/docker-entrypoint-initdb.d/01_dw_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DW_PG_USER:-dw_user} -d ${DW_PG_DB:-dw_ceara}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  # ---------------------------------------------------------------------- #
  # Metastore do Airflow (banco interno, não é o banco de origem nem o DW)
  # ---------------------------------------------------------------------- #
  postgres-airflow:
    image: postgres:15
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pipeline-net

  # ---------------------------------------------------------------------- #
  # Hadoop HDFS — camadas Bronze e Silver
  # ---------------------------------------------------------------------- #
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    environment:
      CLUSTER_NAME: ceara-dw
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode_data:/hadoop/dfs/name
    networks:
      - pipeline-net

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      - namenode
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode_data:/hadoop/dfs/data
    networks:
      - pipeline-net

  # ---------------------------------------------------------------------- #
  # Apache Airflow
  # ---------------------------------------------------------------------- #
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username "${AIRFLOW_ADMIN_USER:-admin}" \
          --password "${AIRFLOW_ADMIN_PASSWORD:-admin}" \
          --firstname Trabalho --lastname Final \
          --role Admin --email admin@example.com || true

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dw:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres-dw:
        condition: service_healthy

  # ---------------------------------------------------------------------- #
  # Jupyter (EDA e treinamento dos modelos)
  # ---------------------------------------------------------------------- #
  jupyter:
    build:
      context: .
      dockerfile: docker/jupyter/Dockerfile
    environment:
      SRC_PG_HOST: "${SRC_PG_HOST}"
      SRC_PG_PORT: "${SRC_PG_PORT}"
      SRC_PG_DB: "${SRC_PG_DB}"
      SRC_PG_USER: "${SRC_PG_USER}"
      SRC_PG_PASSWORD: "${SRC_PG_PASSWORD}"
      DW_PG_HOST: "${DW_PG_HOST:-postgres-dw}"
      DW_PG_PORT: "${DW_PG_PORT:-5432}"
      DW_PG_DB: "${DW_PG_DB:-dw_ceara}"
      DW_PG_USER: "${DW_PG_USER:-dw_user}"
      DW_PG_PASSWORD: "${DW_PG_PASSWORD:-dw_pass}"
      HDFS_WEBHDFS_URL: "${HDFS_WEBHDFS_URL:-http://namenode:9870}"
      HDFS_USER: "${HDFS_USER:-root}"
      HDFS_BRONZE_PATH: "${HDFS_BRONZE_PATH:-/data/bronze}"
      HDFS_SILVER_PATH: "${HDFS_SILVER_PATH:-/data/silver}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      PYTHONPATH: /home/jovyan/work
      JUPYTER_TOKEN: "${JUPYTER_TOKEN:-trabalho-final}"
    ports:
      - "8888:8888"
    volumes:
      - .:/home/jovyan/work
    depends_on:
      postgres-dw:
        condition: service_healthy
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge

volumes:
  postgres_dw_data:
  postgres_airflow_data:
  hadoop_namenode_data:
  hadoop_datanode_data:
